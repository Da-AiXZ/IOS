name: Build IPA (TrollStore)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone ish-arm64 submodule
        run: |
          git clone --depth 1 https://github.com/OpenMinis/ish-arm64.git libish
          echo "ish-arm64 cloned, files: $(ls libish | wc -l)"

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode-16.4.0.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Install build tools
        run: brew install meson ninja ldid xcodegen

      - name: Get iOS SDK path
        run: |
          SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDKROOT=$SDKROOT" >> $GITHUB_ENV
          test -d "$SDKROOT" || { echo "ERROR: SDK not found at $SDKROOT"; exit 1; }

      - name: Patch Meson cross-file
        run: |
          sed -i.bak "s|@SDKROOT@|$SDKROOT|g" ci/crossfiles/ios-arm64.txt
          cat ci/crossfiles/ios-arm64.txt

      - name: Meson setup
        working-directory: libish
        run: |
          meson setup build_arm64 \
            --cross-file ../ci/crossfiles/ios-arm64.txt \
            -Dengine=asbestos \
            -Dkernel=ish \
            -Dguest_arch=arm64 \
            -Ddefault_library=static \
            --buildtype=release

      - name: Ninja build
        working-directory: libish
        run: ninja -C build_arm64

      - name: Verify static libs
        run: |
          ls -lh libish/build_arm64/libish.a
          ls -lh libish/build_arm64/libish_emu.a
          ls -lh libish/build_arm64/libfakefs.a
          lipo -info libish/build_arm64/libish.a

      - name: Download Alpine rootfs
        run: |
          curl -L --retry 3 -o rootfs.tar.gz \
            "https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/aarch64/alpine-minirootfs-3.21.0-aarch64.tar.gz"
          mkdir -p src/Resources/rootfs
          tar -xzf rootfs.tar.gz -C src/Resources/rootfs
          rm rootfs.tar.gz
          echo "Rootfs entries: $(ls src/Resources/rootfs | wc -l)"

      - name: XcodeGen generate
        run: xcodegen generate --spec project.yml

      - name: xcodebuild
        run: |
          set -o pipefail
          xcodebuild build \
            -project AgentBox.xcodeproj \
            -scheme AgentBox \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MESON_BUILD_DIR="$GITHUB_WORKSPACE/libish/build_arm64"

      - name: Package unsigned IPA
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "AgentBox.app" -type d | head -1)
          echo "Found: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r AgentBox-unsigned.ipa Payload/ -q
          rm -rf Payload
          ls -lh AgentBox-unsigned.ipa

      - name: ldid fakesign
        run: |
          unzip -q AgentBox-unsigned.ipa -d Payload/
          ldid -S src/Entitlements.plist Payload/Payload/AgentBox.app/AgentBox
          cd Payload && zip -r ../AgentBox.ipa . -q && cd ..
          rm -rf Payload
          ls -lh AgentBox.ipa

      - name: Release IPA
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AgentBox.ipa
            src/Entitlements.plist
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Failure-Logs
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/
            libish/build_arm64/meson-logs/
