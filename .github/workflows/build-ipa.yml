name: Build IPA (TrollStore)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-13   # Intel x86_64 — ldid built/tested here; cross-compiles ARM64 iOS fine
    timeout-minutes: 120

    steps:
      # ── 1. 代码检出 ──
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone ish-arm64 (depth 1, no submodules)
        run: |
          git clone --depth 1 --single-branch \
            https://github.com/OpenMinis/ish-arm64.git libish
          echo "Cloned $(find libish -maxdepth 1 -type f | wc -l) top-level files"

      # ── 2. 工具链：发现并选择可用的 Xcode ──
      - name: Discover & select Xcode
        run: |
          echo "=== Available Xcodes ==="
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "(none found via ls)"
          echo ""
          echo "=== Current xcode-select ==="
          xcode-select -p 2>/dev/null || echo "(not set)"

          # macos-13 (Intel) default Xcode ≈ 15.0~15.2
          # Intel cross-compile → ARM64 iOS → Intel ldid can parse the Mach-O
          echo ">>> Using default Xcode on macos-13 (Intel)"

          echo ""
          echo "=== Final toolchain ==="
          xcode-select -p
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path
          which clang && clang --version | head -1

      # ── 3. 安装构建工具 ──
      - name: Install build tools
        run: |
          brew install --quiet meson ninja ldid xcodegen lld llvm libarchive 2>&1 | tail -5
          echo "=== Installed versions ==="
          meson --version
          ninja --version
          xcodegen --version

      # ── 4. 获取 SDK root ──
      - name: Capture SDK root
        run: |
          SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDKROOT=$SDKROOT" >> $GITHUB_ENV
          echo "SDK at: $SDKROOT"
          test -d "$SDKROOT" || { echo "FATAL: SDK root not found"; exit 1; }
          ls "$SDKROOT/usr/include" | head -5

      # ── 5. 动态生成 Meson 交叉编译文件 ──
      - name: Generate Meson cross-file
        run: |
          mkdir -p ci/crossfiles
          cat > ci/crossfiles/ios-arm64.txt << 'CROSSEOF'
          [binaries]
          c = 'clang'
          ar = 'ar'
          strip = 'strip'

          [host_machine]
          system = 'darwin'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'

          [built-in options]
          c_args = ['-arch', 'arm64', '-miphoneos-version-min=16.0']
          c_link_args = ['-arch', 'arm64', '-miphoneos-version-min=16.0']

          [properties]
          needs_exe_wrapper = true
          CROSSEOF
          echo "=== Generated cross-file ==="
          cat ci/crossfiles/ios-arm64.txt

      # ── 6. Meson 配置 ──
      - name: Meson setup
        working-directory: libish
        env:
          SDKROOT: ${{ env.SDKROOT }}
          CC: xcrun clang
          CC_FOR_BUILD: env -u SDKROOT -u IPHONEOS_DEPLOYMENT_TARGET xcrun clang
        run: |
          echo "CC=$CC"
          echo "CC_FOR_BUILD=$CC_FOR_BUILD"
          echo "SDKROOT=$SDKROOT"
          meson setup build_arm64 \
            --cross-file ../ci/crossfiles/ios-arm64.txt \
            -Dengine=asbestos \
            -Dkernel=ish \
            -Dguest_arch=arm64 \
            -Ddefault_library=static \
            --buildtype=release \
            --wipe

      # ── 7. Ninja 构建静态库 ──
      - name: Ninja build
        working-directory: libish
        run: |
          ninja -C build_arm64 libish.a libish_emu.a libfakefs.a
          echo "=== Libraries built ==="
          ls -lh build_arm64/libish.a build_arm64/libish_emu.a build_arm64/libfakefs.a

      - name: Verify libraries
        run: |
          echo "=== lipo info ==="
          lipo -info libish/build_arm64/libish.a
          lipo -info libish/build_arm64/libish_emu.a
          lipo -info libish/build_arm64/libfakefs.a

      # ── 8. 下载 Alpine rootfs ──
      - name: Download Alpine rootfs
        run: |
          ROOTFS_URL="https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/aarch64/alpine-minirootfs-3.21.0-aarch64.tar.gz"
          echo "Downloading from $ROOTFS_URL ..."
          curl -L --retry 3 --connect-timeout 30 -o src/Resources/rootfs.tar.gz "$ROOTFS_URL"
          ls -lh src/Resources/rootfs.tar.gz

      # ── 9. XcodeGen 生成项目 ──
      - name: XcodeGen generate
        run: |
          xcodegen generate --spec project.yml --quiet
          # Fix: XcodeGen v2.42 generates format 77 (Xcode 16+) even when xcodeVersion=15
          # Xcode 15.4 requires format 56 (Xcode 14); patch pbxproj objectVersion
          sed -i '' 's/objectVersion = 77;/objectVersion = 56;/' AgentBox.xcodeproj/project.pbxproj
          echo "Project generated + format patched to 56"
          ls -lh AgentBox.xcodeproj/project.pbxproj

      # ── 10. Xcode 编译 ──
      - name: xcodebuild
        run: |
          set -o pipefail
          xcodebuild build \
            -project AgentBox.xcodeproj \
            -scheme AgentBox \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$GITHUB_WORKSPACE/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MESON_BUILD_DIR="$GITHUB_WORKSPACE/libish/build_arm64" \
            2>&1 | tee xcodebuild.log
          echo "=== Build exit code: $? ==="

      # ── 11. 打包 IPA ──
      - name: Package unsigned IPA
        run: |
          set -e
          APP=$(find "$GITHUB_WORKSPACE/DerivedData" -name "AgentBox.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: .app not found"
            find "$GITHUB_WORKSPACE/DerivedData" -maxdepth 4 -type d 2>/dev/null || echo "(empty)"
            echo "=== xcodebuild tail ==="
            tail -50 xcodebuild.log || true
            exit 1
          fi
          echo "Found: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          # Copy entitlements into .app bundle so TrollStore can find them
          cp src/Entitlements.plist Payload/AgentBox.app/
          zip -r AgentBox-unsigned.ipa Payload/ -q
          rm -rf Payload
          echo "Unsigned IPA: $(ls -lh AgentBox-unsigned.ipa)"

      # ── 12. 诊断 Mach-O + zsign 签名 ──
      - name: Diagnose & sign (zsign + ldid fallback)
        env:
          SDKROOT: ""
        run: |
          set +e
          rm -rf Payload
          unzip -q "$GITHUB_WORKSPACE/AgentBox-unsigned.ipa"
          BIN=Payload/AgentBox.app/AgentBox
          SIGNED=false

          # ── 诊断：看 Mach-O 结构 ──
          echo "=== Mach-O header ==="
          file "$BIN" || echo "(file cmd failed)"
          otool -h "$BIN" 2>/dev/null | head -10 || echo "(otool failed)"
          otool -l "$BIN" 2>/dev/null | grep -E "cmd |cmdsize" | head -30 || echo "(otool -l failed)"
          echo "=== End diagnostics ==="

          # ── 方法 1: zsign (全新 Mach-O 解析器) ──
          echo "=== zsign ==="
          git clone --depth 1 https://github.com/zhlynn/zsign.git /tmp/zsign
          cd /tmp/zsign/build/macos
          brew install pkg-config openssl 2>/dev/null
          make clean && make 2>/dev/null && {
            cp zsign /usr/local/bin/zsign
            cd "$GITHUB_WORKSPACE"
            # zsign -a = ad-hoc, -e = entitlements plist
            if zsign -a -e src/Entitlements.plist -o /tmp/signed.ipa AgentBox-unsigned.ipa 2>&1; then
              if unzip -q /tmp/signed.ipa -d /tmp/signed_check/ 2>/dev/null; then
                if codesign -d --entitlements - /tmp/signed_check/Payload/AgentBox.app/AgentBox 2>/dev/null | grep -q "no-sandbox"; then
                  echo "ZSIGN: SUCCESS — entitlements embedded!"
                  cp /tmp/signed.ipa AgentBox.ipa
                  SIGNED=true
                fi
                rm -rf /tmp/signed_check
              fi
            fi
          } || echo "zsign build or sign failed"
          cd "$GITHUB_WORKSPACE"

          # ── 方法 2: ldid-334 回退 ──
          if [ "$SIGNED" = false ]; then
            echo "=== ldid-334 fallback ==="
            git clone --depth 1 --branch v2.1.5-procursus7-new \
              https://github.com/opa334/ldid.git /tmp/ldid-334
            cd /tmp/ldid-334
            brew install openssl@3 libplist pkg-config 2>/dev/null
            make -j$(sysctl -n hw.logicalcpu) \
              OPENSSL_PREFIX=$(brew --prefix openssl@3) \
              LIBPLIST_PREFIX=$(brew --prefix libplist) 2>/dev/null
            cp ldid /usr/local/bin/ldid-334
            cd "$GITHUB_WORKSPACE"
            if ldid-334 -S src/Entitlements.plist "$BIN" 2>/dev/null; then
              if codesign -d --entitlements - "$BIN" 2>/dev/null | grep -q "no-sandbox"; then
                echo "ldid-334: SUCCESS"
                SIGNED=true
              fi
            fi
          fi

          # ── 打包 ──
          if [ "$SIGNED" = true ]; then
            echo "=== IPA signed with entitlements ==="
            # If zsign already created AgentBox.ipa, skip
            [ ! -f AgentBox.ipa ] && zip -r AgentBox.ipa Payload/ -q
          else
            echo "=== All signing methods failed, releasing unsigned ==="
            zip -r AgentBox.ipa Payload/ -q 2>/dev/null
          fi
          rm -rf Payload /tmp/signed.ipa /tmp/zsign /tmp/ldid-334
          echo "IPA: $(ls -lh AgentBox.ipa)"

      # ── 13. 发布 Release ──
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AgentBox.ipa
            src/Entitlements.plist
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 14. 失败时上传日志 ──
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Failure-Logs-${{ github.run_number }}
          path: |
            xcodebuild.log
            libish/build_arm64/meson-logs/
            DerivedData/**/Logs/
