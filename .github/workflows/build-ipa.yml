name: Build IPA (TrollStore)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # --- 阶段 1: 构建 ish-arm64 静态库 ---
      - name: Install Meson + Ninja
        run: brew install meson ninja ldid xcodegen

      - name: Get iOS SDK path
        run: |
          SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDKROOT=$SDKROOT" >> $GITHUB_ENV
          echo "iOS SDK: $SDKROOT"

      - name: Patch cross-file
        run: |
          sed -i.bak "s|@SDKROOT@|$SDKROOT|g" ci/crossfiles/ios-arm64.txt
          echo "Cross-file:"
          cat ci/crossfiles/ios-arm64.txt

      - name: Configure Meson
        working-directory: libish
        run: |
          meson setup build_arm64 \
            --cross-file ../ci/crossfiles/ios-arm64.txt \
            -Dengine=asbestos \
            -Dkernel=ish \
            -Dguest_arch=arm64 \
            -Ddefault_library=static \
            --buildtype=release

      - name: Build libish
        working-directory: libish
        run: ninja -C build_arm64

      - name: Verify libs
        run: |
          echo "=== libish.a ===" && ls -lh libish/build_arm64/libish.a
          echo "=== libish_emu.a ===" && ls -lh libish/build_arm64/libish_emu.a
          echo "=== libfakefs.a ===" && ls -lh libish/build_arm64/libfakefs.a
          lipo -info libish/build_arm64/libish.a

      # --- 阶段 2: 下载 Alpine rootfs ---
      - name: Download Alpine rootfs
        run: |
          curl -L -o rootfs.tar.gz \
            "https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/aarch64/alpine-minirootfs-3.21.0-aarch64.tar.gz"
          mkdir -p src/Resources/rootfs
          tar -xzf rootfs.tar.gz -C src/Resources/rootfs
          rm rootfs.tar.gz
          echo "Rootfs ready: $(ls src/Resources/rootfs | wc -l) entries"

      # --- 阶段 3: XcodeGen + Swift 编译 ---
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml --quiet

      - name: Build unsigned IPA
        run: |
          set -o pipefail
          xcodebuild build \
            -project AgentBox.xcodeproj \
            -scheme AgentBox \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MESON_BUILD_DIR="$GITHUB_WORKSPACE/libish/build_arm64" \
            | tee build.log

      - name: Package unsigned IPA
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "AgentBox.app" -type d | head -1)
          echo "Found: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r AgentBox-unsigned.ipa Payload/ -q
          rm -rf Payload

      # --- 阶段 4: ldid 假签名 ---
      - name: ldid fakesign
        run: |
          unzip -q AgentBox-unsigned.ipa -d Payload/
          ldid -Ssrc/Entitlements.plist Payload/Payload/AgentBox.app/AgentBox
          cd Payload && zip -r ../AgentBox.ipa . -q && cd ..
          rm -rf Payload
          echo "Signed: $(ls -lh AgentBox.ipa)"

      # --- 阶段 5: 发布 ---
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AgentBox.ipa
            src/Entitlements.plist
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: build.log
